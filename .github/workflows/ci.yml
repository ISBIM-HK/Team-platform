name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: devpassword
          POSTGRES_DB: teamplat_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d teamplat_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://app:devpassword@localhost:5432/teamplat_test
      DATABASE_URL_SYNC: postgresql+psycopg2://app:devpassword@localhost:5432/teamplat_test
      ALLOWED_EMAIL_DOMAINS: example.com
      SECRET_KEY: ci-secret-key
      APP_ENV: development

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest -q
