services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: teamplat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d teamplat"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    # DB host inside the compose network is `postgres` (overrides .env's localhost)
    environment:
      DATABASE_URL: postgresql+asyncpg://app:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/teamplat
      DATABASE_URL_SYNC: postgresql+psycopg2://app:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/teamplat
    # Secrets + LLM + registration config come from .env (gitignored)
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2-alpine
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddydata:/data
    depends_on:
      - app
    restart: unless-stopped

volumes:
  pgdata:
  caddydata:
