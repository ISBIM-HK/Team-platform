name: panorama_3d
goal: |
  客户需要：上传一段全景视频，系统据此自动完成 3D 重建，输出一个可查看的三维模型。
  覆盖从视频输入到可交付 3D 模型的完整流程。
team_context: |
  - Dave（算法，做过 CV / 三维重建）
  - Erin（后端）
  - Frank（前端，会 WebGL / three.js）

expect:
  min_subtasks: 5
  max_subtasks: 24   # 全管线（抽帧→SfM→MVS→网格→导出→查看器）细拆 ~20 条属正常
  min_confidence: 0.4
  all_have_estimate: true
  coverage:
    - ["视频", "抽帧", "帧"]
    - ["相机", "位姿", "标定", "SfM", "运动恢复"]
    - ["点云", "重建", "网格", "mesh", "纹理"]
    - ["模型", "导出", "展示", "查看"]

judge_rubric: |
  评估这份拆解是否：
  1) 覆盖三维重建的关键阶段：视频预处理/抽帧 → 相机位姿估计(SfM) → 稠密重建/点云 → 网格+纹理 → 模型导出与前端展示；
  2) 子任务粒度合理、可独立执行；
  3) 估时务实；
  4) 没有遗漏"可查看的交付物"这一端到端目标。
