name: tender_ai
goal: |
  Tender AI：构建一个 AI 能力，对客户提交的 tender（投标文件）做三方面校验——
  1) 是否符合招标方的标准要求/规范；
  2) 文件内部各章节之间是否存在冲突或不一致；
  3) 是否存在法律风险（条款合规、责任界定等）。
  最终给出结构化的校验报告。
team_context: |
  - Alice（后端，熟悉 NLP / 文档解析）
  - Bob（全栈）
  - Carol（产品，懂招投标合规）

# 硬断言
expect:
  min_subtasks: 5
  max_subtasks: 24   # 含 3 个分析模块 + 报告，细拆到单任务≤16h 时 ~20 条属正常
  min_confidence: 0.5
  all_have_estimate: true
  # 每组关键词至少被某个子任务（标题+描述）命中——验证三大子需求都被拆到
  coverage:
    - ["标准", "要求", "规范", "合规"]
    - ["冲突", "一致", "矛盾"]
    - ["法律", "风险"]

# LLM-as-judge 评分标准
judge_rubric: |
  评估这份拆解是否：
  1) 完整覆盖"标准符合性校验 / 内部冲突检测 / 法律风险识别"三大子需求（缺一扣分）；
  2) 包含 tender 文档的解析/结构化这一前置步骤；
  3) 每个子任务可独立交付、非"设计+开发+测试"打包；
  4) 估时务实（单任务 ≤16h）。
