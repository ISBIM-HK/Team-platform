<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Team Platform</title>
<link rel="stylesheet" href="/styles.css" />
</head>
<body>

<!-- ─── Login ─── -->
<div id="login">
  <div class="login-card">
    <div class="brand-mark">T</div>
    <h1 id="loginTitle">欢迎回来</h1>
    <p class="sub" id="loginSub">登录到 Team Platform</p>

    <div class="field" id="nameField" style="display:none">
      <label>显示名称</label>
      <input id="dispName" type="text" placeholder="你的名字" />
    </div>
    <div class="field">
      <label>邮箱</label>
      <input id="email" type="email" placeholder="you@example.com" autocomplete="username" />
    </div>
    <div class="field">
      <label>密码</label>
      <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button class="btn btn-primary" id="loginBtn">登 录</button>
    <div class="form-error" id="loginErr"></div>
    <div class="login-toggle">
      <span id="toggleText">还没有账号？</span>
      <button id="toggleMode">注册</button>
    </div>
  </div>
</div>

<!-- ─── App ─── -->
<div id="app">
  <header class="topbar">
    <div class="brand"><div class="brand-mark">T</div><b>Team Platform</b></div>
    <div class="spacer"></div>
    <button class="iconbtn" id="openDrawer" title="待处理建议">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
      <span class="badge" id="sugBadge" style="display:none">0</span>
    </button>
    <div class="who">登录为 <b id="whoName">—</b><span class="pill-pm" id="pmPill" style="display:none">PM</span></div>
    <button class="btn btn-ghost btn-sm" id="logoutBtn">退出</button>
  </header>

  <main>
    <!-- Hero composer: goal → decompose -->
    <section class="composer">
      <div class="eyebrow">AI 任务拆解</div>
      <h2>把一个目标，变成分好工的子任务</h2>
      <div class="row">
        <textarea id="goalInput" rows="1" placeholder="例如：给平台加一个飞书 OAuth 登录功能…"></textarea>
        <button class="btn btn-primary" id="decomposeBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3v4M3 5h4M6 17v4M4 19h4M13 3l2.5 6.5L22 12l-6.5 2.5L13 21l-2.5-6.5L4 12l6.5-2.5z"/></svg>
          <span>拆解</span>
        </button>
      </div>
    </section>

    <div class="work-grid">
      <!-- Kanban -->
      <div>
        <div class="section-title">看板</div>
        <div class="board" id="board"></div>
      </div>

      <!-- Assistant -->
      <div class="assistant">
        <div class="ahead"><span class="pulse"></span><b>个人助手</b><span id="aStatus">在线</span></div>
        <div class="msgs" id="msgs"></div>
        <div class="composer-chat">
          <input id="chatInput" type="text" placeholder="问我，或让我记录工作…" />
          <button class="send" id="chatSend" title="发送">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- ─── Plan modal ─── -->
<div class="overlay" id="planOverlay">
  <div class="modal">
    <div class="mhead">
      <div class="eyebrow">拆解建议 · 待确认</div>
      <h3 id="planTitle">—</h3>
      <div class="rationale" id="planRationale"></div>
    </div>
    <div class="mbody" id="planBody"></div>
    <div class="mfoot">
      <span class="conf" id="planConf"></span>
      <button class="btn btn-ghost" id="planReject">忽略</button>
      <button class="btn btn-primary" id="planAccept">接受并创建</button>
    </div>
  </div>
</div>

<!-- ─── Suggestions drawer ─── -->
<div class="drawer" id="drawer">
  <div class="dhead"><h3>待处理建议</h3><button class="close-x" id="closeDrawer">✕</button></div>
  <div class="dbody" id="drawerBody"></div>
</div>

<div class="toast" id="toast"></div>

<script src="/app.js"></script>
</body>
</html>
